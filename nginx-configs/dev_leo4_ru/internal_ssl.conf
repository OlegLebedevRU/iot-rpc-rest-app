server {
    listen 4443 ssl;
    listen [::]:4443 ssl;
    server_name dev.leo4.ru;
    resolver 127.0.0.11 valid=10s;
    set $backend2 http://app1:8000;
    access_log /var/log/nginx/ssl-mutual-access.log;
    error_log /var/log/nginx/ssl-mutual-error.log debug;

    # Сертификат сервера
    ssl_certificate /crt/legacy_cert_dev_leo4_ru.crt;
    ssl_certificate_key /crt/server_key.pem;

    # Полностью отключаем проверку, но принимаем сертификат
    #ssl_verify_client off;
    #ssl_verify_depth 1;
    ssl_verify_client optional_no_ca;
    location /ssl-mutual-test/ {
        # Принудительно читаем сертификат, даже если не проверяли
        if ($ssl_client_cert = "") {
            set $ssl_client_cert "no-client-cert";
        }

        proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert;
        proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass $backend2/api/v1/devices/map_legacy_crt/;
        proxy_redirect off;
    }

    location = /ssl-debug {
        return 200 "
        Client Cert: $ssl_client_escaped_cert
        ";
        add_header Content-Type text/plain;
    }
}