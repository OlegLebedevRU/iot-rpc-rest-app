server {
    listen 4443 ssl;
    listen [::]:4443 ssl;
    server_name dev.leo4.ru;

    access_log /var/log/nginx/ssl-mutual-access.log ssl_debug;
    error_log /var/log/nginx/ssl-mutual-error.log debug;

    # Сертификат сервера
    ssl_certificate /crt/legacy_cert_dev_leo4_ru.crt;
    ssl_certificate_key /crt/server-key.pem;

    # Отключаем проверку CA, но принимаем сертификат
    ssl_verify_client optional_no_ca;

    location /ssl-mutual-test/ {
        proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert;
        proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://app1:8000/api/v1/devices/map_legacy_crt/;
        proxy_redirect off;
    }

    # Диагностика
    location = /ssl-debug {
        return 200 "
        Client Verify: $ssl_client_verify
        Subject DN: $ssl_client_s_dn
        Issuer DN: $ssl_client_i_dn
        ";
        add_header Content-Type text/plain;
    }
}