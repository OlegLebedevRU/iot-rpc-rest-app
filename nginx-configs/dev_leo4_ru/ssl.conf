# /etc/nginx/conf.d/ssl.conf

# === Upstreams ===
upstream backend_app {
    server app1:8000;
    zone backend_zone 64k;
    keepalive 16;
}

upstream leo4_cloud {
    server d5ducjnc3s38o5qqk84q.apigw.yandexcloud.net:443;
    zone leo4_zone 64k;
    keepalive 16;
}

# === Server ===
server {
    listen 443 default_server ssl;
    listen [::]:443 ssl;
    server_name dev.leo4.ru;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    ssl_certificate /etc/nginx/ssl/live/dev.leo4.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/dev.leo4.ru/privkey.pem;

    access_log /var/log/nginx/access.log custom;
    error_log /var/log/nginx/error.log notice;

    # === JWT Settings ===
    auth_jwt_enabled on;
    auth_jwt_algorithm RS256;
    auth_jwt_redirect off;

    auth_jwt_key "-----BEGIN PUBLIC KEY-----
MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAqX393A/1A+OW9ISPrWbK
/qodWp7xMd0clA7VwGoOK6fW0Q0m7iwUoBk6PfyaUZPToIlMMn07x3OR3Idf9rdH
ZBTxYaIVBOTAC3/a9uLMi/ElLf8u1xxNffByUEbWL6lMViQgoSkxh2zLckSyvsyH
S2TMrSh4Lcq8d+QOVupgh/dOguLn8BXgVHgLtsrGJ7DqL78mwbJ6emp+LV+zeUot
xT03UwxmgFKr1AZnRGZI1Zp/xEUSYc1hX9ZzrF01jiNi1ln3NNxTqCWxpnlICxhh
QNF68AUG012qLnykaKak+9TclImCG+i+Giuj+Qc5B4j6J46kfLVZA/Ra64ugTbZy
nQIDAQAB
-----END PUBLIC KEY-----";

    # === CORS: Разрешённые домены (для других путей) ===
    set $allowed_cors_origins "";

    if ($http_origin ~* ^(https?://localhost:5173|https://dev\.leo4\.ru)$) {
        set $allowed_cors_origins $http_origin;
    }

    # Для Vary
    add_header Vary "Origin, Cookie" always;

    # === Запрет подмены orgId ===
    if ($http_orgId) {
        return 403 "Forbidden: setting 'orgId' header is not allowed\n";
    }

    # === Публичный логин (/public/login/) ===
    location ~ ^/public/login/?$ {
        auth_jwt_enabled off;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        add_header Access-Control-Allow-Origin $allowed_cors_origins always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,Connection" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        rewrite ^/public/login/?$ /account/login break;

        proxy_pass https://leo4_cloud;
        proxy_http_version 1.1;
        proxy_set_header Host d5ducjnc3s38o5qqk84q.apigw.yandexcloud.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin "";
        proxy_ssl_server_name on;
        proxy_buffering off;
    }

    # === Рефреш токена (/private/refresh/) ===
    location = /private/refresh/ {
        auth_jwt_enabled off;  # Отключаем JWT-валидацию — пусть бэкенд сам проверяет

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        add_header Access-Control-Allow-Origin $allowed_cors_origins always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST" always;
        add_header Access-Control-Allow-Headers "Content-Type,Authorization" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        rewrite ^ /account/refresh/ break;

        proxy_pass https://leo4_cloud;
        proxy_http_version 1.1;
        proxy_set_header Host d5ducjnc3s38o5qqk84q.apigw.yandexcloud.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin "";           # Критично: как в /public/login/
        proxy_set_header Connection "";       # Иногда помогает
        proxy_ssl_server_name on;
        proxy_buffering off;
        proxy_pass_request_headers on;        # Гарантирует передачу всех заголовков
    }

    # === API: JWT (фронтенд) — /api/jwt/v1/... ===
    location ~ ^/api/jwt/v1/(?<api_path>.*)$ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin $allowed_cors_origins always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key,orgId,org_id" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        auth_jwt_location COOKIE=accessToken;
        auth_jwt_extract_var_claims orgId;
        proxy_set_header orgId $jwt_claim_orgId;

        proxy_set_header X-API-Key $http_x_api_key;

        proxy_pass http://backend_app/api/v1/$api_path$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # === API: API-ключ (внешние серверы) — /api/key/v1/... ===
    location ~ ^/api/key/v1/(?<api_path>.*)$ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin $allowed_cors_origins always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key,orgId,org_id" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        auth_jwt_enabled off;

        if ($http_x_api_key = "") {
            return 401 "Unauthorized: X-API-Key required\n";
        }

        proxy_set_header X-API-Key $http_x_api_key;

        proxy_pass http://backend_app/api/v1/$api_path$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # === API: Legacy /api/v1/... — с CORS для localhost:5173 и withCredentials ===
location ~ ^/api/v1/(?<api_path>.*)$ {
    # Очищаем заголовки от бэкенда
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;

    # Разрешаем только http://localhost:5173 с credentials
    set $cors_origin "";

    if ($http_origin ~* ^https?://localhost:5173$) {
        set $cors_origin $http_origin;
    }

    # Добавляем заголовки
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key,orgId,org_id" always;

    # Preflight
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Авторизация
    auth_jwt_enabled off;

    if ($http_x_api_key = "") {
        return 401 "Unauthorized: X-API-Key required for legacy /api/v1/*\n";
    }

    proxy_set_header X-API-Key $http_x_api_key;

    # Прокси
    proxy_pass http://backend_app/api/v1/$api_path$is_args$args;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
}

# === pgAdmin ===
    location /pgadmin {
        auth_jwt_enabled off;
        proxy_pass http://pgadmin:80;
        proxy_redirect http:// $scheme://;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Script-Name /pgadmin;
    }

    # === Документация (Swagger) ===
    location ~ ^/docs(.*)$ {
        auth_jwt_enabled off;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        add_header Access-Control-Allow-Origin $allowed_cors_origins always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type,Authorization" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass http://backend_app/docs$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        auth_jwt_enabled off;
        add_header Access-Control-Allow-Origin $allowed_cors_origins always;
        add_header Access-Control-Allow-Credentials "true" always;
        proxy_pass http://backend_app/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Фавикон ===
    location /favicon.ico {
        auth_jwt_enabled off;
        root /var/share/nginx/html;
        try_files $uri /favicon.ico;
    }

    # === Логин-страница (SPA) ===
location = /login {
    auth_jwt_enabled off;
    root /var/share/nginx/html;
    try_files $uri /index.html;
}

    # === Статика (assets) ===
    location /assets/ {
        auth_jwt_enabled off;
        root /var/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # === Основной SPA ===
    location / {
        auth_jwt_enabled off;
        root /var/share/nginx/html;
        try_files $uri /index.html;
    }
}