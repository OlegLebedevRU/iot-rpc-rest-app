# /etc/nginx/conf.d/ssl.conf

server {
    ## SSL Settings
    listen 443 default_server ssl;
    listen [::]:443 ssl;
    server_name dev.leo4.ru;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    ssl_certificate /etc/nginx/ssl/live/dev.leo4.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/dev.leo4.ru/privkey.pem;

    access_log /var/log/nginx/access.log custom;
    error_log /var/log/nginx/error.log notice;

    # Включаем JWT-аутентификацию глобально (но можно отключать)
    auth_jwt_enabled on;
    auth_jwt_algorithm RS256;
    auth_jwt_redirect off;

    # Публичный ключ для верификации JWT
    auth_jwt_key "-----BEGIN PUBLIC KEY-----
MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAqX393A/1A+OW9ISPrWbK
/qodWp7xMd0clA7VwGoOK6fW0Q0m7iwUoBk6PfyaUZPToIlMMn07x3OR3Idf9rdH
ZBTxYaIVBOTAC3/a9uLMi/ElLf8u1xxNffByUEbWL6lMViQgoSkxh2zLckSyvsyH
S2TMrSh4Lcq8d+QOVupgh/dOguLn8BXgVHgLtsrGJ7DqL78mwbJ6emp+LV+zeUot
xT03UwxmgFKr1AZnRGZI1Zp/xEUSYc1hX9ZzrF01jiNi1ln3NNxTqCWxpnlICxhh
QNF68AUG012qLnykaKak+9TclImCG+i+Giuj+Qc5B4j6J46kfLVZA/Ra64ugTbZy
nQIDAQAB
-----END PUBLIC KEY-----";

    # Для CORS
    set $cors "1";
    add_header Vary "Origin, Cookie" always;

    # Внешний бэкенд
    set $leo4_cloud_host "https://d5ducjnc3s38o5qqk84q.apigw.yandexcloud.net";
    set $backend1 http://app1:8000;

    # === Запрет установки orgId во входящем запросе ===
    if ($http_orgId) {
        return 403 "Forbidden: setting 'orgId' header is not allowed\n";
    }

    # === Публичный логин (CORS + Basic Auth) ===
    location ~ ^/public/login/?$ {
        auth_jwt_enabled off;

        # Pre-flight OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,Connection" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # Основные заголовки CORS
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Прокси на внешний логин
        proxy_pass $leo4_cloud_host/account/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin "";
        proxy_buffering off;
    }

    # === Рефреш токена — прокси с JWT-проверкой куки ===
    location = /private/refresh/ {
        auth_jwt_location COOKIE=refreshToken;
        auth_jwt_redirect off;

        proxy_pass $leo4_cloud_host/account/refresh/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cookie_path / "/";
        proxy_buffering off;
    }

    # === Логин (без JWT) — legacy, можно удалить при переходе на /public/login/ ===
    location = /api/login/ {
        auth_jwt_enabled off;
        proxy_pass $leo4_cloud_host/account/login2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # === API: JWT (фронтенд) — новый путь ===
location ~ ^/api/jwt/v1/(?<api_path>.*)$ {
    # Проверяем JWT из куки accessToken
    auth_jwt_location COOKIE=accessToken;
    auth_jwt_extract_var_claims orgId;
    proxy_set_header orgId $jwt_claim_orgId;

    # Всегда пробрасываем X-API-Key, если присутствует (иначе — пусто)
    proxy_set_header X-API-Key $http_x_api_key;

    # Запрещаем подмену orgId
    if ($http_orgId) {
        return 403 "Forbidden: setting 'orgId' header is not allowed\n";
    }

    # Проксируем на бэкенд
    proxy_pass $backend1/api/v1/$api_path$is_args$args;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
}

    # === API: API-ключ (внешние серверы) — новый путь ===
    location ~ ^/api/key/v1/(?<api_path>.*)$ {
        auth_jwt_enabled off;

        if ($http_x_api_key = "") {
            return 401 "Unauthorized: X-API-Key required\n";
        }

        proxy_set_header X-API-Key $http_x_api_key;

        # Проксируем
        proxy_pass $backend1/api/v1/$api_path$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # === API: Legacy /v1 — только с X-API-Key (совместимость со Swagger) ===
    location ~ ^/api/v1/(?<api_path>.*)$ {
        auth_jwt_enabled off;

        if ($http_x_api_key = "") {
            return 401 "Unauthorized: X-API-Key required for legacy /api/v1/*\n";
        }

        # Запрещаем подмену orgId
        if ($http_orgId) {
            return 403 "Forbidden: setting 'orgId' header is not allowed\n";
        }

        proxy_set_header X-API-Key $http_x_api_key;

        # Проксируем
        proxy_pass $backend1/api/v1/$api_path$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # === Тестовый эндпоинт ===
    location /ssl-test {
        auth_jwt_enabled off;
        add_header Content-Type text/html;
        return 200 '<html><body><h1>SSL TEST OK</h1></body></html>';
    }

    # === RabbitMQ Web UI (прокси) ===
    location /rmq/ {
        auth_jwt_enabled off;
        rewrite ^/rmq$ /rmq/ permanent;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_pass http://rabbitmq:15672/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect / /rmq/;
        sub_filter 'href="/' 'href="/rmq/';
        sub_filter 'src="/' 'src="/rmq/';
        sub_filter 'action="/' 'action="/rmq/';
        sub_filter '"/api/' '"/rmq/api/';
        sub_filter_once off;
        sub_filter_types text/html;
    }

    location /rmq/api/ {
        auth_jwt_enabled off;
        proxy_pass http://rabbitmq:15672/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect /api/ /rmq/api/;
    }

    # === pgAdmin ===
    location /pgadmin {
        auth_jwt_enabled off;
        proxy_pass http://pgadmin:80;
        proxy_redirect http:// $scheme://;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Script-Name /pgadmin;
    }

    # === Документация (Swagger) ===
    location ~ ^/docs(.*)$ {
        auth_jwt_enabled off;
        proxy_pass $backend1/docs$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        auth_jwt_enabled off;
        proxy_pass $backend1/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Фавикон ===
    location /favicon.ico {
        auth_jwt_enabled off;
        root /var/share/nginx/html;
        try_files $uri /favicon.ico;
    }

    # === Логин-страница (SPA) ===
    location = /login {
        auth_jwt_enabled off;
        root /var/share/nginx/html;
        try_files $uri /login/index.html;
    }

    # === Основной SPA (React App) ===
    location / {
        auth_jwt_enabled off;
        root /var/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}